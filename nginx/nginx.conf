events {
    worker_connections 1024;
}

http {

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # $binary_remote_addr = client IP in binary form (smaller memory footprint)
    # zone=api_limit:10m = shared memory zone named "api_limit", 10MB
    # 10MB holds ~160,000 IP states
    # rate=30r/m = 30 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # ── Upstream pool — Nginx load balances across both workers ───────────────
    upstream api_pool {
        # least_conn sends each new request to the worker with fewest
        # active connections — better than round-robin for async workloads
        least_conn;

        server api_1:8000;
        server api_2:8000;

        # Keep 32 idle connections open to each upstream worker
        # Avoids TCP handshake overhead on every request
        keepalive 32;
    }

    server {
        listen 80;

        # ── Apply rate limit ──────────────────────────────────────────────────
        # burst=10 allows a short spike of 10 extra requests
        # nodelay serves the burst immediately instead of queuing them
        limit_req zone=api_limit burst=10 nodelay;

        # Return 429 (not Nginx's default 503) when rate limit is hit
        limit_req_status 429;

        # ── CORS headers on EVERY response, including 429s ────────────────────
        # "always" means: add this header even on error responses (4xx, 5xx)
        # Without "always", Nginx only adds headers to 2xx/3xx responses
        add_header 'Access-Control-Allow-Origin'      $http_origin   always;
        add_header 'Access-Control-Allow-Credentials' 'true'         always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type'     always;


        # ── Proxy to FastAPI workers ──────────────────────────────────────────
        location / {
            proxy_pass http://api_pool;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";  # required for keepalive

            proxy_http_version 1.1;

            # Timeouts
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }
    }
}