[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
env =
    POSTGRES_USER=pulse_user
    POSTGRES_PASSWORD=pulse_pass
    POSTGRES_DB=pulse_test
    POSTGRES_HOST=db
    POSTGRES_PORT=5432
    REDIS_HOST=redis
    REDIS_PORT=6379
    SECRET_KEY=test_secret_key_for_testing_only
    DEBUG=true
    POSTGRES_REPLICA_HOST=db