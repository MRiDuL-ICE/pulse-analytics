app = "pulse-analytics"
primary_region = "sin"        # Singapore — closest free region to Bangladesh

[build]
  image = "timescale/timescaledb:latest-pg17"

[env]
  POSTGRES_DB   = "pulse_db"
  POSTGRES_USER = "pulse_user"

[[mounts]]
  source      = "pg_data"
  destination = "/var/lib/postgresql/data"

[[services]]
  protocol    = "tcp"
  internal_port = 5432

  [[services.ports]]
    port = 5432